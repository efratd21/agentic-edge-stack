<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agentic Edge Stack — Chat</title>
<style>
  :root { --bg:#0f1117; --panel:#171a23; --bubble-user:#2563eb; --bubble-ai:#1f2430;
          --text:#e6e8ee; --muted:#9aa3b2; --border:#262b38; --accent:#3b82f6;
          --tool:#1c2a1f; --tool-border:#2f7d43; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:flex; flex-direction:column;
         background:var(--bg); color:var(--text);
         font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  header { padding:14px 20px; border-bottom:1px solid var(--border);
           display:flex; align-items:baseline; gap:10px; }
  header h1 { font-size:16px; font-weight:600; margin:0; }
  header .sub { font-size:12px; color:var(--muted); }
  #log { flex:1; overflow-y:auto; padding:20px; display:flex;
         flex-direction:column; gap:14px; max-width:820px; width:100%;
         margin:0 auto; }
  .msg { display:flex; }
  .msg.user { justify-content:flex-end; }
  .bubble { max-width:78%; padding:10px 14px; border-radius:14px;
            line-height:1.5; white-space:pre-wrap; word-wrap:break-word; }
  .user .bubble { background:var(--bubble-user); color:#fff; border-bottom-right-radius:4px; }
  .ai .bubble { background:var(--bubble-ai); border:1px solid var(--border);
                border-bottom-left-radius:4px; }
  .tool { font-size:12.5px; color:#bfe7c8; background:var(--tool);
          border:1px solid var(--tool-border); border-radius:10px;
          padding:6px 10px; margin-bottom:8px; font-family: ui-monospace, monospace; }
  .tool .label { color:#7fd694; font-weight:600; }
  .cursor::after { content:"▋"; color:var(--muted); animation:blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  footer { border-top:1px solid var(--border); padding:14px 20px;
           max-width:820px; width:100%; margin:0 auto; }
  form { display:flex; gap:10px; }
  textarea { flex:1; resize:none; background:var(--panel); color:var(--text);
             border:1px solid var(--border); border-radius:12px; padding:11px 14px;
             font:inherit; font-size:15px; height:46px; max-height:160px; }
  textarea:focus { outline:none; border-color:var(--accent); }
  button { background:var(--accent); color:#fff; border:none; border-radius:12px;
           padding:0 20px; font:inherit; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .hint { font-size:11.5px; color:var(--muted); margin-top:8px; text-align:center; }
</style>
</head>
<body>
  <header>
    <h1>Agentic Edge Stack</h1>
    <span class="sub" id="sub">local agent · streaming over SSE</span>
  </header>

  <div id="log">
    <div class="msg ai"><div class="bubble">Ask me about AI agents — agent loops,
ReAct, tool calling, RAG, agent memory. I'll search a local knowledge base when a
question needs it, and answer general questions directly.</div></div>
  </div>

  <footer>
    <form id="form">
      <textarea id="input" placeholder="Ask something…" autofocus></textarea>
      <button id="send" type="submit">Send</button>
    </form>
    <div class="hint">Enter to send · Shift+Enter for newline</div>
  </footer>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');

fetch('/health').then(r => r.json()).then(d => {
  if (d.model) document.getElementById('sub').textContent = 'model: ' + d.model + ' · streaming over SSE';
}).catch(() => {});

function addMsg(role) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  wrap.appendChild(bubble);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return bubble;
}

function addTool(text) {
  const t = document.createElement('div');
  t.className = 'tool';
  t.innerHTML = text;
  log.appendChild(t);
  log.scrollTop = log.scrollHeight;
}

async function ask(message) {
  addMsg('user').textContent = message;
  const bubble = addMsg('ai');
  bubble.classList.add('cursor');

  const resp = await fetch('/chat', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ message })
  });

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const frames = buf.split('\n\n');
    buf = frames.pop();
    for (const frame of frames) {
      const line = frame.replace(/^data: /, '').trim();
      if (!line || line === '[DONE]') continue;
      let ev;
      try { ev = JSON.parse(line); } catch { continue; }
      if (ev.type === 'token') {
        bubble.textContent += ev.text;
      } else if (ev.type === 'tool_call') {
        addTool('<span class="label">searched knowledge base</span> &middot; ' +
                (ev.args && ev.args.query ? ev.args.query : ''));
      }
      log.scrollTop = log.scrollHeight;
    }
  }
  bubble.classList.remove('cursor');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  send.disabled = true;
  try { await ask(message); }
  catch (err) { addMsg('ai').textContent = '[error] ' + err; }
  finally { send.disabled = false; input.focus(); }
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
</script>
</body>
</html>
